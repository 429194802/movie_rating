services:
  - type: web
    name: movie-rating
    env: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: SITE_NAME
        value: 新片评分
      - key: DOUBAN_CITY
        value: beijing
      - key: ADMIN_SYNC_TOKEN
        generateValue: true
